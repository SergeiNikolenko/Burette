pre-commit:
  parallel: true
  commands:
    release-version:
      run: npm run check:release
    js-syntax:
      run: npm run check:js
    plist:
      run: plutil -lint apps/desktop/src-tauri/AppMetadata.plist PreviewExtension/Info.plist PreviewExtension/BurretePreview.entitlements

pre-push:
  commands:
    ci:
      run: npm run ci
