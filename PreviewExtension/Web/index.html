<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Burrete Preview</title>
  <link rel="stylesheet" href="./molstar.css" />
  <style>
    html, body, #app { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #111317; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; color: #f2f2f2; }
    #app { position: absolute; inset: 0; }
    #status {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      z-index: 2147483647; max-width: min(820px, calc(100vw - 48px)); max-height: calc(100vh - 48px); overflow: auto;
      box-sizing: border-box; padding: 12px 14px; border-radius: 12px; color: rgba(255, 255, 255, 0.94);
      background: rgba(0, 0, 0, 0.72); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      font-size: 13px; font-weight: 600; line-height: 1.35; white-space: pre-wrap; pointer-events: none;
      transition: opacity 160ms ease-in-out;
    }
    #status.hidden { opacity: 0; }
    #status.error {
      left: 16px; right: 16px; top: 16px; transform: none; max-width: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px; font-weight: 500; pointer-events: auto;
    }
  </style>
  <script>
    (function () {
      function post(type, message) {
        try { window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.burrete.postMessage({ type: type, message: message || '' }); } catch (_) {}
      }
      window.__mqlPost = post;
      window.addEventListener('error', function (event) {
        var message = (event.error && event.error.stack) || event.message || String(event);
        var el = document.getElementById('status');
        if (el) { el.textContent = '[web] JavaScript error\n\n' + message; el.classList.add('error'); el.classList.remove('hidden'); }
        post('error', message);
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason || {};
        var message = reason.stack || reason.message || String(reason);
        var el = document.getElementById('status');
        if (el) { el.textContent = '[web] Unhandled promise rejection\n\n' + message; el.classList.add('error'); el.classList.remove('hidden'); }
        post('error', message);
      });
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="status">[web] Loading Mol* preview shell…</div>
  <script>window.BurreteCacheBuster = String(Date.now());</script>
  <script src="./viewer.js"></script>
</body>
</html>
