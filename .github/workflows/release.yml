name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Validate release version
        run: bun run check:release

      - name: Resolve version
        id: version
        run: |
          version="$(bun --eval "console.log(require('./package.json').version)")"
          tag="v${version}"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME:-}" != "${tag}" ]]; then
              echo "Tag ${GITHUB_REF_NAME:-unknown} does not match package version ${version}." >&2
              exit 1
            fi
          elif git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists. Bump package.json before merging another PR." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Resolve release capabilities
        id: capabilities
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          BURRETE_CODESIGN_IDENTITY: ${{ secrets.BURRETE_CODESIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          BURRETE_UPDATE_MANIFEST_PUBLIC_KEY_HEX: ${{ secrets.BURRETE_UPDATE_MANIFEST_PUBLIC_KEY_HEX }}
          BURRETE_UPDATE_MANIFEST_PRIVATE_KEY_PEM: ${{ secrets.BURRETE_UPDATE_MANIFEST_PRIVATE_KEY_PEM }}
        run: |
          if [[ -n "${MACOS_CERTIFICATE_P12_BASE64:-}" && -n "${MACOS_CERTIFICATE_PASSWORD:-}" && -n "${MACOS_KEYCHAIN_PASSWORD:-}" && -n "${BURRETE_CODESIGN_IDENTITY:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            echo "developer_id=true" >> "$GITHUB_OUTPUT"
          else
            echo "developer_id=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "${BURRETE_UPDATE_MANIFEST_PUBLIC_KEY_HEX:-}" && -n "${BURRETE_UPDATE_MANIFEST_PRIVATE_KEY_PEM:-}" ]]; then
            echo "signed_manifest=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed_manifest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        if: steps.capabilities.outputs.developer_id == 'true'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain

      - name: Build app
        env:
          BURRETE_CODESIGN_IDENTITY: ${{ secrets.BURRETE_CODESIGN_IDENTITY }}
          BURRETE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          BURRETE_XCODE_CONFIGURATION: Release
          BURRETE_UPDATE_MANIFEST_PUBLIC_KEY_HEX: ${{ secrets.BURRETE_UPDATE_MANIFEST_PUBLIC_KEY_HEX }}
          BURRETE_RELEASE_ALLOW_ADHOC: ${{ steps.capabilities.outputs.developer_id == 'true' && '0' || '1' }}
        run: ./scripts/build.sh

      - name: Notarize app
        if: steps.capabilities.outputs.developer_id == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent build/Burrete.app notarization.zip
          xcrun notarytool submit notarization.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple build/Burrete.app

      - name: Validate release signing
        env:
          BURRETE_RELEASE_ALLOW_ADHOC: ${{ steps.capabilities.outputs.developer_id == 'true' && '0' || '1' }}
        run: ./scripts/check-release-signature.sh build/Burrete.app

      - name: Package app
        env:
          BURRETE_UPDATE_MANIFEST_PRIVATE_KEY_PEM: ${{ secrets.BURRETE_UPDATE_MANIFEST_PRIVATE_KEY_PEM }}
          BURRETE_UPDATE_MANIFEST_PUBLIC_KEY_HEX: ${{ secrets.BURRETE_UPDATE_MANIFEST_PUBLIC_KEY_HEX }}
        run: |
          rm -rf release
          mkdir -p release
          cp -R build/Burrete.app release/Burrete.app
          ditto -c -k --keepParent release/Burrete.app "Burrete-${{ steps.version.outputs.version }}.zip"
          shasum -a 256 "Burrete-${{ steps.version.outputs.version }}.zip" > "Burrete-${{ steps.version.outputs.version }}.zip.sha256"
          if [[ -n "${BURRETE_UPDATE_MANIFEST_PRIVATE_KEY_PEM:-}" && -n "${BURRETE_UPDATE_MANIFEST_PUBLIC_KEY_HEX:-}" ]]; then
            bun scripts/sign-update-manifest.mjs "Burrete-${{ steps.version.outputs.version }}.zip" .
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            "Burrete-${{ steps.version.outputs.version }}.zip"
          )
          if [[ -f "Burrete-${{ steps.version.outputs.version }}.zip.sha256" ]]; then
            assets+=("Burrete-${{ steps.version.outputs.version }}.zip.sha256")
          fi
          if [[ -f "Burrete-${{ steps.version.outputs.version }}.zip.manifest.json" ]]; then
            assets+=("Burrete-${{ steps.version.outputs.version }}.zip.manifest.json")
          fi
          if [[ -f "Burrete-${{ steps.version.outputs.version }}.zip.manifest.json.sig" ]]; then
            assets+=("Burrete-${{ steps.version.outputs.version }}.zip.manifest.json.sig")
          fi
          gh release create "${{ steps.version.outputs.tag }}" \
            "${assets[@]}" \
            --title "Burrete ${{ steps.version.outputs.version }}" \
            --generate-notes
